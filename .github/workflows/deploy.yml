name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main  # Or 'master' based on your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '21.5.0'  # Your Node.js version

    - name: Install dependencies
      run: npm install

    - name: Build the React app
      run: npm run build

    - name: Configure Git
      run: |
        git config --global user.name squaredphoenix
        git config --global user.email nixeriser@gmail.com

    - name: Deploy to GitHub Pages
      run: npm run deploy

    - name: Cleanup gh-pages cache
      run: rm -rf node_modules/.cache/gh-pages
